<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Golgappa ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4e8a,#7b2ff7);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.container{
padding:30px;
}

h1{
font-size:3rem;
animation:fadeIn 2s;
}

p{
font-size:1.4rem;
margin-top:20px;
line-height:1.8;
animation:fadeIn 3s;
}

button{
margin-top:35px;
padding:18px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff2f6d;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.1);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday My Golgappa ji ❤️</h1>

<p>

From your Rasmalai ❤️

<br><br>

Distance may keep us apart today,

but not even for a second

does my heart stop thinking about you.

</p>

<button onclick="alert('Your complete surprise is coming ❤️')">

Open My Surprise 🎁

</button>

</div>

</body>
</html>
